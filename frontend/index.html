<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobStream AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        
        <aside class="sidebar left-sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-inbox"></i> Live Incoming</h2>
                <span class="pulse-indicator"></span>
            </div>
            <div class="card-list" id="incoming-list">
                </div>
        </aside>

        <main class="main-dashboard">
            <header class="dashboard-header">
                <h1>JobStream AI Dashboard</h1>
                <p>Real-time analytics and routing metrics</p>
            </header>

            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-icon blue"><i class="fa-solid fa-download"></i></div>
                    <div class="metric-info">
                        <h3>Total Received</h3>
                        <p id="metric-received">0</p>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon green"><i class="fa-solid fa-microchip"></i></div>
                    <div class="metric-info">
                        <h3>Processed (Filtered)</h3>
                        <p id="metric-processed">0</p>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon yellow"><i class="fa-solid fa-filter-circle-xmark"></i></div>
                    <div class="metric-info">
                        <h3>Ignored</h3>
                        <p id="metric-ignored">0</p>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon red"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    <div class="metric-info">
                        <h3>Errors</h3>
                        <p id="metric-errors">0</p>
                    </div>
                </div>
            </div>

            <div class="chart-container">
                <h3>Message Activity (Last 12 Hours)</h3>
                <div>
                    <canvas id="activityChart"></canvas>
                </div>
                
            </div>

            <div class="health-section">
                <h3>System Status</h3>
                <div class="health-grid">
                    <div class="health-card">
                        <i class="fa-brands fa-telegram telegram-color"></i>
                        <span>Telegram Listener</span>
                        <div class="status online">Online</div>
                    </div>
                    <div class="health-card">
                        <i class="fa-brands fa-whatsapp whatsapp-color"></i>
                        <span>WhatsApp Service</span>
                        <div class="status online">Online</div>
                    </div>
                    <div class="health-card">
                        <i class="fa-solid fa-brain groq-color"></i>
                        <span>Groq LLM Engine</span>
                        <div class="status online">Ready</div>
                    </div>
                </div>
            </div>
        </main>

        <aside class="sidebar right-sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-paper-plane"></i> Outgoing Log</h2>
            </div>
            <div class="card-list" id="outgoing-list">
                </div>
        </aside>

    </div>
    <script src="js/app.js"></script>
</body>
</html>
